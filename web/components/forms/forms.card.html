<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; max-width: 660px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Field, Input, Textarea, Select, Checkbox, Switch } = window.FinRAGDesignSystem_2f3924;
const Search = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;

function Demo() {
  const [c1, setC1] = React.useState(true);
  const [c2, setC2] = React.useState(false);
  const [s1, setS1] = React.useState(true);
  return (
    <div className="grid">
      <div className="stack">
        <Field label="Search documents">
          <Input icon={<Search/>} placeholder="10-K, revenue, FY2024…" />
        </Field>
        <Field label="Access role" required>
          <Select defaultValue="finance">
            <option value="owner">Owner</option>
            <option value="finance">Finance</option>
            <option value="hr">HR</option>
            <option value="employee">Employee</option>
          </Select>
        </Field>
        <Field label="Document ID">
          <Input mono defaultValue="DOC-10K-2024-0481" />
        </Field>
      </div>
      <div className="stack">
        <Field label="Question" hint="Answers are grounded in your indexed sources.">
          <Textarea placeholder="What was operating margin in FY2024?" />
        </Field>
        <Field label="Workspace name" error="This name is already taken.">
          <Input invalid defaultValue="Acme Treasury" />
        </Field>
        <div className="stack" style={{gap:'10px'}}>
          <Checkbox checked={c1} onChange={()=>setC1(!c1)} label="Notify me when indexing completes" />
          <Checkbox checked={c2} onChange={()=>setC2(!c2)} label="Pin frequently-used documents" />
          <Switch checked={s1} onChange={()=>setS1(!s1)} label="Show retrieval scores on sources" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
