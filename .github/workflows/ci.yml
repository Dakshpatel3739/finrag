name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict
        run: mypy --strict .

      - name: Pytest
        env:
          # CI uses stub values; NIM calls are mocked in tests
          NVIDIA_API_KEY: "nvapi-ci-stub"
          MILVUS_MODE: "lite"
          MILVUS_LITE_DB_PATH: "/tmp/milvus_ci.db"
          DEPLOY_MODE: "hosted"
          JWT_SECRET: "ci-test-secret-that-is-long-enough-for-hs256-signing"
        run: pytest -m "not slow" --cov=. --cov-report=term-missing

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: lint-type-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deploy/Dockerfile.api -t finrag-api:${{ github.sha }} .
