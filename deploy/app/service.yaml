# ClusterIP Service for the chain-server.
# WHAT: gives the API a stable in-cluster DNS name and a target for ALB ingress.
# WHY: service discovery should not depend on individual pod IPs.
apiVersion: v1
kind: Service
metadata:
  name: chain-server
  namespace: finrag
  labels:
    app.kubernetes.io/name: chain-server
    app.kubernetes.io/part-of: finrag
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: chain-server
  ports:
    - name: http
      port: 8000
      targetPort: http
