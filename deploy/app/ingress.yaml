# Public ALB Ingress for the FinRAG API surface.
# WHAT: exposes only the chain-server/frontend edge through AWS ALB.
# WHY: NIMs and Milvus are internal dependencies and must remain ClusterIP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finrag-public
  namespace: finrag
  labels:
    app.kubernetes.io/part-of: finrag
  annotations:
    # WHAT: AWS Load Balancer Controller provisions an internet-facing ALB.
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    # WHY target-type ip lets ALB route to ClusterIP-backed pods without NodePort.
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/group.name: finrag-phase5
spec:
  ingressClassName: alb
  rules:
    - host: finrag.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chain-server
                port:
                  number: 8000

# Exposure rule:
# - Public/LB: frontend or chain-server edge only.
# - Internal only: llama-3-1-8b-instruct, nv-embedqa-e5-v5,
#   nv-rerankqa-mistral-4b-v3, and Milvus.
