# Embedding NIMService for FinRAG.
# WHAT: serves nv-embedqa-e5-v5 on an internal ClusterIP service.
# WHY: FinRAG uses this endpoint for dense vectors during ingest and retrieval.
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: nv-embedqa-e5-v5
  namespace: nim-service
  labels:
    app.kubernetes.io/part-of: finrag
    finrag.io/nim-role: embedding
spec:
  image:
    repository: nvcr.io/nim/nvidia/nv-embedqa-e5-v5
    # Verify this NGC tag on burst day before apply; keep pinned, not latest.
    tag: "1.0.1"
    pullPolicy: IfNotPresent
    pullSecrets:
      - ngc-secret
  authSecret: ngc-api-secret
  storage:
    nimCache:
      name: nv-embedqa-e5-v5
      # Pin to a verified NIMCache.status.profiles[].name if the cache reports
      # multiple profiles for the A10G.
      profile: ""
  replicas: 1
  nodeSelector:
    finrag.io/node-pool: gpu
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  resources:
    limits:
      nvidia.com/gpu: 1
  expose:
    service:
      type: ClusterIP
      port: 8000
      # Non-LLM NIMs can expose a separate metrics port depending on image.
      # If this NIM reports Triton metrics on another port, add metricsPort here.
  metrics:
    enabled: true
    serviceMonitor:
      interval: 15s
      additionalLabels:
        release: kube-prometheus-stack
  startupProbe:
    enabled: true
    probe:
      httpGet:
        path: /v1/health/ready
        port: 8000
      periodSeconds: 10
      failureThreshold: 120
